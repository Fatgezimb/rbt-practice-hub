<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting | RBT Practice Hub</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/404\.html$/, "");
        var parts = path.split("/").filter(Boolean);
        var route = parts.pop() || "";
        var base = parts.length ? "/" + parts.join("/") + "/" : "/";
        window.location.replace(base + "#/" + route + window.location.search);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to RBT Practice Hub.</p>
  </body>
</html>
